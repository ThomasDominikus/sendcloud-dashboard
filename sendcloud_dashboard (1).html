<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendCloud Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #252830;
    --accent: #00d4aa;
    --accent2: #ff6b35;
    --accent3: #4a9eff;
    --text: #e8eaf0;
    --muted: #6b7280;
    --success: #22c55e;
    --warning: #f59e0b;
    --error: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left { display: flex; align-items: center; gap: 16px; }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .date-badge {
    background: var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .topbar-right { display: flex; align-items: center; gap: 16px; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
  .status-dot.error { background: var(--error); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .refresh-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .countdown {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* PROGRESS BAR */
  .progress-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear;
  }

  /* DEBUG PANEL */
  .debug-panel {
    margin: 16px 28px;
    background: #0a0c10;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    display: none;
  }
  .debug-panel.visible { display: block; }
  .debug-panel .debug-line { margin: 2px 0; }
  .debug-panel .ok { color: var(--success); }
  .debug-panel .err { color: var(--error); }
  .debug-panel .info { color: var(--accent3); }

  /* ERROR BANNER */
  .error-banner {
    margin: 16px 28px;
    background: rgba(239,68,68,0.1);
    border: 1px solid var(--error);
    border-radius: 8px;
    padding: 14px 18px;
    color: var(--error);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    display: none;
  }
  .error-banner.visible { display: block; }

  /* MAIN */
  .main { padding: 20px 28px; }

  /* KPI GRID */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card.c1::before { background: var(--accent); }
  .kpi-card.c2::before { background: var(--success); }
  .kpi-card.c3::before { background: var(--accent3); }
  .kpi-card.c4::before { background: var(--accent2); }
  .kpi-card.c5::before { background: var(--warning); }

  .kpi-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .kpi-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
  }

  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* CHARTS ROW */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  @media (max-width: 800px) { .charts-row { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .chart-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .bar-label { width: 90px; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .bar-count { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); width: 28px; text-align: right; }

  /* TABLE */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .table-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .table-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .table-scroll { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  tbody td {
    padding: 10px 14px;
    font-size: 13px;
    vertical-align: middle;
  }

  .status-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
  }

  .pill-ready { background: rgba(34,197,94,0.15); color: var(--success); }
  .pill-transit { background: rgba(74,158,255,0.15); color: var(--accent3); }
  .pill-delivered { background: rgba(0,212,170,0.15); color: var(--accent); }
  .pill-other { background: rgba(107,114,128,0.15); color: var(--muted); }

  .track-link {
    color: var(--accent3);
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
  }
  .track-link:hover { text-decoration: underline; }

  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toggle-debug {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
  }
  .toggle-debug:hover { border-color: var(--accent); color: var(--accent); }

  .last-updated {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">SENDCLOUD</span>
    <span class="date-badge" id="dateBadge">—</span>
  </div>
  <div class="topbar-right">
    <span class="last-updated" id="lastUpdated">Nog niet geladen</span>
    <div class="status-dot" id="statusDot"></div>
    <span class="countdown" id="countdown"></span>
    <button class="toggle-debug" onclick="toggleDebug()">debug</button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width:100%"></div>
</div>

<div class="debug-panel" id="debugPanel">
  <div style="font-weight:600;margin-bottom:8px;color:var(--text)">🔧 Debug Info</div>
  <div id="debugLines"></div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="main">
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card c1"><div class="kpi-label">Totaal labels</div><div class="kpi-value" id="kTotal">—</div></div>
    <div class="kpi-card c2"><div class="kpi-label">Ready to send</div><div class="kpi-value" id="kReady">—</div></div>
    <div class="kpi-card c3"><div class="kpi-label">In transit</div><div class="kpi-value" id="kTransit">—</div></div>
    <div class="kpi-card c4"><div class="kpi-label">Bezorgd</div><div class="kpi-value" id="kDelivered">—</div></div>
    <div class="kpi-card c5"><div class="kpi-label">Overig</div><div class="kpi-value" id="kOther">—</div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Carriers</div>
      <div id="carrierChart"><div class="loading-state"><span class="spinner"></span>Laden...</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Bestemmingslanden</div>
      <div id="countryChart"><div class="loading-state"><span class="spinner"></span>Laden...</div></div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Alle labels vandaag</span>
      <span class="table-count" id="tableCount">0 labels</span>
    </div>
    <div class="table-scroll">
      <div id="tableBody"><div class="loading-state"><span class="spinner"></span>Data ophalen...</div></div>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://sandcloud-proxy-production.up.railway.app';
const REFRESH_INTERVAL = 300; // 5 minuten in seconden

let countdown = REFRESH_INTERVAL;
let timer = null;
let debugVisible = false;
let allParcels = [];

function log(msg, type = 'info') {
  const el = document.getElementById('debugLines');
  const d = document.createElement('div');
  d.className = `debug-line ${type}`;
  d.textContent = `[${new Date().toLocaleTimeString('nl-NL')}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function toggleDebug() {
  debugVisible = !debugVisible;
  document.getElementById('debugPanel').classList.toggle('visible', debugVisible);
}

function setStatus(state) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (state === 'live' ? 'live' : state === 'error' ? 'error' : '');
}

function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.textContent = '⚠ ' + msg;
  b.classList.add('visible');
  setStatus('error');
}

function hideError() {
  document.getElementById('errorBanner').classList.remove('visible');
}


function getTodayBounds() {
  // Today in Europe/Amsterdam (UTC+2 in summer)
  const now = new Date();
  // Amsterdam is UTC+2 in summer (CEST)
  const amsterdamOffset = 2 * 60; // minutes
  const localOffset = now.getTimezoneOffset(); // minutes behind UTC (negative in NL)
  const diff = amsterdamOffset + localOffset; // extra minutes to add

  const amsterdam = new Date(now.getTime() + diff * 60000);

  const y = amsterdam.getFullYear();
  const m = String(amsterdam.getMonth() + 1).padStart(2, '0');
  const d = String(amsterdam.getDate()).padStart(2, '0');

  // Start of today 07:30 Amsterdam = 05:30 UTC
  const startAms = new Date(`${y}-${m}-${d}T07:30:00+02:00`);
  // End of today
  const endAms   = new Date(`${y}-${m}-${d}T23:59:59+02:00`);

  log(`Vandaag Amsterdam: ${y}-${m}-${d}`, 'info');
  log(`Filter van: ${startAms.toISOString()} t/m ${endAms.toISOString()}`, 'info');

  return { startAms, endAms, label: `${d}-${m}-${y}` };
}

async function fetchAllParcels() {
  const { startAms, endAms, label } = getTodayBounds();
  document.getElementById('dateBadge').textContent = label;

  let allResults = [];
  let cursor = null;
  let page = 1;
  let maxPages = 30;
  let hitOldData = false;

  while (page <= maxPages && !hitOldData) {
    // Try with date params first — even if API ignores them, doesn't hurt
    let url = `${PROXY}/parcels?limit=100`;
    if (cursor) url += `&cursor=${encodeURIComponent(cursor)}`;

    log(`Pagina ${page} ophalen...`, 'info');

    const res = await fetch(url, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    });

    log(`HTTP status: ${res.status}`, res.ok ? 'ok' : 'err');

    if (!res.ok) {
      const txt = await res.text();
      log(`Fout body: ${txt.substring(0, 200)}`, 'err');
      throw new Error(`HTTP ${res.status}: ${txt.substring(0, 100)}`);
    }

    const json = await res.json();
    const batch = json.parcels || [];
    log(`Pagina ${page}: ${batch.length} parcels ontvangen`, 'ok');

    if (batch.length === 0) {
      log('Geen parcels meer, stoppen.', 'info');
      break;
    }

    // Client-side filter using date_created field (format: "08-06-2026 11:20:13" = Amsterdam time)
    let keptInBatch = 0;
    for (const p of batch) {
      const raw = p.date_created;
      if (!raw) continue;
      // Parse "DD-MM-YYYY HH:MM:SS" — this is already Amsterdam local time
      const parts = raw.match(/(\d{2})-(\d{2})-(\d{4}) (\d{2}):(\d{2}):(\d{2})/);
      if (!parts) { log('Datum parsen mislukt: ' + raw, 'err'); continue; }
      const isoStr = parts[3] + '-' + parts[2] + '-' + parts[1] + 'T' + parts[4] + ':' + parts[5] + ':' + parts[6] + '+02:00';
      const created = new Date(isoStr);
      if (isNaN(created.getTime())) { log('Ongeldige datum: ' + raw, 'err'); continue; }

      if (created >= startAms && created <= endAms) {
        allResults.push(p);
        keptInBatch++;
      } else if (created < startAms) {
        log('Parcel ' + p.id + ' aangemaakt op ' + raw + ' — ouder dan 07:30, stoppen.', 'info');
        hitOldData = true;
        break;
      }
    }
    log('Behouden na filter: ' + keptInBatch + ' (totaal: ' + allResults.length + ')', 'ok');

    if (!hitOldData && json.next) {
      try {
        const nextUrl = new URL(json.next);
        cursor = nextUrl.searchParams.get('cursor');
        log(`Volgende cursor: ${cursor}`, 'info');
        page++;
      } catch {
        log('Kon cursor niet uitlezen, stoppen.', 'err');
        break;
      }
    } else if (!json.next) {
      log('Geen volgende pagina, klaar.', 'ok');
      break;
    }
  }

  log(`Totaal na filter: ${allResults.length} parcels van vandaag vanaf 07:30`, 'ok');
  return allResults;
}

function getStatusInfo(status) {
  const id = status?.id;
  const msg = status?.message || 'Onbekend';
  if (id === 1000) return { label: msg, cls: 'pill-ready' };
  if (id >= 2000 && id < 3000) return { label: msg, cls: 'pill-transit' };
  if (id >= 11 && id <= 13) return { label: msg, cls: 'pill-delivered' };
  return { label: msg, cls: 'pill-other' };
}

function renderCharts(parcels) {
  // Carriers
  const carriers = {};
  parcels.forEach(p => {
    const name = p.carrier?.code || p.carrier?.name || 'Onbekend';
    carriers[name] = (carriers[name] || 0) + 1;
  });
  const maxC = Math.max(...Object.values(carriers), 1);
  const colors = ['#00d4aa','#4a9eff','#ff6b35','#f59e0b','#a78bfa','#ec4899'];
  document.getElementById('carrierChart').innerHTML = Object.entries(carriers)
    .sort((a,b) => b[1]-a[1])
    .map(([name, count], i) => `
      <div class="bar-row">
        <div class="bar-label">${name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count/maxC)*100}%;background:${colors[i%colors.length]}"></div></div>
        <div class="bar-count">${count}</div>
      </div>`).join('') || '<div style="color:var(--muted);font-size:12px">Geen data</div>';

  // Countries
  const countries = {};
  parcels.forEach(p => {
    const c = p.address?.country?.iso_2 || p.country?.iso_2 || '??';
    countries[c] = (countries[c] || 0) + 1;
  });
  const maxCC = Math.max(...Object.values(countries), 1);
  document.getElementById('countryChart').innerHTML = Object.entries(countries)
    .sort((a,b) => b[1]-a[1]).slice(0,8)
    .map(([code, count], i) => `
      <div class="bar-row">
        <div class="bar-label">${code}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCC)*100}%;background:${colors[i%colors.length]}"></div></div>
        <div class="bar-count">${count}</div>
      </div>`).join('') || '<div style="color:var(--muted);font-size:12px">Geen data</div>';
}

function renderTable(parcels) {
  document.getElementById('tableCount').textContent = `${parcels.length} labels`;

  if (parcels.length === 0) {
    document.getElementById('tableBody').innerHTML = `<div class="loading-state">Geen labels gevonden voor vandaag</div>`;
    return;
  }

  const sorted = [...parcels].sort((a,b) => {
    const parse = raw => { if (!raw) return 0; const m = raw.match(/(\d{2})-(\d{2})-(\d{4}) (\d{2}):(\d{2}):(\d{2})/); return m ? new Date(m[3]+'-'+m[2]+'-'+m[1]+'T'+m[4]+':'+m[5]+':'+m[6]+'+02:00').getTime() : 0; };
    return parse(b.date_created) - parse(a.date_created);
  });

  document.getElementById('tableBody').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Tijd</th>
          <th>Ref</th>
          <th>Ontvanger</th>
          <th>Stad</th>
          <th>Land</th>
          <th>Carrier</th>
          <th>Status</th>
          <th>Tracking</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map(p => {
          const s = getStatusInfo(p.status);
          const time = p.date_created ? p.date_created.split(' ')[1].substring(0,5) : '—';
          const carrier = p.carrier?.code || p.carrier?.name || '—';
          const country = p.address?.country?.iso_2 || p.country?.iso_2 || '—';
          const city = p.address?.city || p.city || '—';
          const name = p.address?.company_name || p.address?.name || p.name || '—';
          const trackUrl = p.tracking_url || (p.tracking_number ? `https://track.sendcloud.sc/returns/tracking?tracking_number=${p.tracking_number}` : null);
          return `
            <tr>
              <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)">${time}</td>
              <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${p.reference || p.id || '—'}</td>
              <td>${name}</td>
              <td>${city}</td>
              <td style="font-family:'IBM Plex Mono',monospace">${country}</td>
              <td style="font-family:'IBM Plex Mono',monospace;font-size:12px">${carrier}</td>
              <td><span class="status-pill ${s.cls}">${s.label}</span></td>
              <td>${trackUrl ? `<a class="track-link" href="${trackUrl}" target="_blank">${p.tracking_number || 'Track'}</a>` : '<span style="color:var(--muted)">—</span>'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function updateKPIs(parcels) {
  let ready = 0, transit = 0, delivered = 0, other = 0;
  parcels.forEach(p => {
    const id = p.status?.id;
    if (id === 1000) ready++;
    else if (id >= 2000 && id < 3000) transit++;
    else if (id >= 11 && id <= 13) delivered++;
    else other++;
  });
  document.getElementById('kTotal').textContent = parcels.length;
  document.getElementById('kReady').textContent = ready;
  document.getElementById('kTransit').textContent = transit;
  document.getElementById('kDelivered').textContent = delivered;
  document.getElementById('kOther').textContent = other;
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '↻ Laden...';
  hideError();
  log('=== Start data ophalen ===', 'info');

  try {
    const parcels = await fetchAllParcels();
    allParcels = parcels;

    updateKPIs(parcels);
    renderCharts(parcels);
    renderTable(parcels);

    setStatus('live');
    document.getElementById('lastUpdated').textContent = 'Bijgewerkt: ' + new Date().toLocaleTimeString('nl-NL');
    log('=== Klaar ===', 'ok');
  } catch(e) {
    log(`Fout: ${e.message}`, 'err');
    showError(`Kan proxy niet bereiken: ${e.message}`);
    // Show debug panel automatically on error
    document.getElementById('debugPanel').classList.add('visible');
    debugVisible = true;
  }

  btn.disabled = false;
  btn.textContent = '↻ Refresh';
  resetCountdown();
}

function resetCountdown() {
  countdown = REFRESH_INTERVAL;
  updateProgress();
}

function updateProgress() {
  const pct = (countdown / REFRESH_INTERVAL) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  const m = Math.floor(countdown / 60);
  const s = String(countdown % 60).padStart(2, '0');
  document.getElementById('countdown').textContent = `Refresh over ${m}:${s}`;
}

function startTimer() {
  if (timer) clearInterval(timer);
  timer = setInterval(() => {
    countdown--;
    updateProgress();
    if (countdown <= 0) {
      loadData();
    }
  }, 1000);
}

// Start
loadData();
startTimer();
</script>
</body>
</html>
